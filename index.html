<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WOW!SGNL × Schumer 2028 — Proposal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #07080A;
  --bg-1: #0D0F14;
  --bg-2: #12151C;
  --bg-3: #181C26;
  --line: #20242E;
  --line-2: #2C313D;
  --ink: #F3F1EC;
  --ink-2: #B7B5AE;
  --ink-3: #7A7970;
  --ink-4: #4A4A44;
  --amber: #F5A524;
  --amber-2: #FFC567;
  --amber-dim: rgba(245,165,36,.14);
  --grad-warm: radial-gradient(ellipse at 20% 0%, rgba(245,165,36,.16), transparent 55%),
               radial-gradient(ellipse at 100% 30%, rgba(199,179,255,.08), transparent 60%);
  --grad-panel: linear-gradient(180deg, rgba(245,165,36,.06), rgba(199,179,255,.03) 60%, transparent);
  --ok: #7FD39B;
  --warn: #E06C5A;
  --cyan: #7FCBD6;
  --serif: 'Instrument Serif', ui-serif, Georgia, serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}
*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; height: 100%; overflow: hidden; }
body{ font-size: 15px; line-height: 1.55; }
#root{ height: 100vh; }
a{ color: inherit; }
img{ max-width: 100%; }
::selection{ background: var(--amber); color: #0A0B0D; }

/* layout */
.wrap{ max-width: 1240px; margin: 0 auto; padding: 0 40px; }
section{ position: relative; }

/* ========== DECK SHELL ========== */
.deck-root{
  position: fixed; inset: 0;
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: 56px 1fr 64px;
  grid-template-areas:
    "top   top"
    "side  stage"
    "side  bottom";
}
.deck-top{ grid-area: top; background: rgba(7,8,10,.85); backdrop-filter: blur(18px); border-bottom: 1px solid var(--line); z-index: 50; }
.deck-top-inner{ display:flex; align-items:center; justify-content: space-between; padding: 0 32px; height: 100%; }
.deck-top .brand{ display:flex; align-items:center; gap: 10px; font-family: var(--mono); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
.deck-top .brand-mark{ width: 22px; height: 22px; display:grid; place-items:center; background: var(--amber); color:#0A0B0D; font-weight: 700; border-radius: 3px; font-family: var(--mono); font-size: 11px; }
.deck-meta{ font-family: var(--mono); font-size: 10px; color: var(--ink-3); letter-spacing: .08em; text-transform: uppercase; display:flex; gap: 28px; align-items: center; }
.deck-meta em{ color: var(--ink); font-style: normal; }
.deck-counter{ display:inline-flex; align-items: center; gap: 4px; }
.deck-counter em{ color: var(--amber); font-size: 13px; }
.deck-counter .sep{ color: var(--ink-4); }

/* side index */
.deck-side{ grid-area: side; border-right: 1px solid var(--line); padding: 32px 24px; display:flex; flex-direction: column; background: var(--bg); position: relative; z-index: 40; }
.side-lbl{ font-family: var(--mono); font-size: 10px; letter-spacing: .16em; color: var(--ink-4); text-transform: uppercase; margin-bottom: 20px; }
.side-list{ list-style: none; padding: 0; margin: 0; flex: 1; }
.side-item{ display:grid; grid-template-columns: 28px 1fr 12px; align-items:center; gap: 10px; padding: 11px 10px; cursor: pointer; border-radius: 2px; position: relative; transition: all .15s; }
.side-item:hover{ background: rgba(255,255,255,.03); }
.side-item .side-num{ font-family: var(--mono); font-size: 10px; letter-spacing: .1em; color: var(--ink-4); }
.side-item .side-lbl-txt{ font-family: var(--serif); font-size: 17px; color: var(--ink-2); letter-spacing: -0.005em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.side-item .side-tick{ width: 6px; height: 6px; border-radius: 50%; background: transparent; border: 1px solid var(--line-2); }
.side-item.past .side-num{ color: var(--ink-3); }
.side-item.past .side-lbl-txt{ color: var(--ink-3); }
.side-item.past .side-tick{ background: var(--ink-3); border-color: var(--ink-3); }
.side-item.on{ background: linear-gradient(90deg, rgba(245,165,36,.08), transparent); }
.side-item.on::before{ content:''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px; background: var(--amber); border-radius: 1px; }
.side-item.on .side-num{ color: var(--amber); }
.side-item.on .side-lbl-txt{ color: var(--ink); font-style: italic; }
.side-item.on .side-tick{ background: var(--amber); border-color: var(--amber); box-shadow: 0 0 12px rgba(245,165,36,.5); }
.side-foot{ border-top: 1px solid var(--line); padding-top: 18px; margin-top: 18px; display:flex; flex-direction: column; gap: 8px; }
.side-key{ font-family: var(--mono); font-size: 10px; color: var(--ink-4); letter-spacing: .06em; }
.side-key kbd{ display:inline-block; padding: 2px 6px; border: 1px solid var(--line-2); border-radius: 2px; font-family: var(--mono); font-size: 10px; color: var(--ink-2); background: var(--bg-2); margin: 0 2px; }

/* stage */
.deck-stage{ grid-area: stage; position: relative; overflow: hidden; background: var(--bg); }
.deck-panel{ position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; animation: panelIn .55s cubic-bezier(.2,.7,0,1) both; }
.deck-panel::-webkit-scrollbar{ width: 6px; }
.deck-panel::-webkit-scrollbar-track{ background: transparent; }
.deck-panel::-webkit-scrollbar-thumb{ background: var(--line-2); border-radius: 3px; }
.deck-panel.enter-right{ animation-name: panelInRight; }
.deck-panel.enter-left{ animation-name: panelInLeft; }
@keyframes panelInRight{
  from{ opacity: 0; transform: translateX(40px); filter: blur(4px); }
  to{ opacity: 1; transform: none; filter: none; }
}
@keyframes panelInLeft{
  from{ opacity: 0; transform: translateX(-40px); filter: blur(4px); }
  to{ opacity: 1; transform: none; filter: none; }
}

/* bottom bar */
.deck-bottom{ grid-area: bottom; display:grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 32px; padding: 0 32px; border-top: 1px solid var(--line); background: rgba(7,8,10,.85); backdrop-filter: blur(18px); z-index: 50; }
.deck-btn{ display:flex; align-items: center; gap: 14px; background: transparent; border: 1px solid var(--line); padding: 10px 16px; border-radius: 2px; cursor: pointer; transition: all .15s; text-align: left; height: 46px; }
.deck-btn:hover:not(:disabled){ border-color: var(--amber); background: var(--amber-dim); }
.deck-btn:disabled{ opacity: .3; cursor: not-allowed; }
.deck-btn .arrow{ font-family: var(--mono); font-size: 18px; color: var(--amber); }
.deck-btn .stack{ display:flex; flex-direction: column; gap: 2px; }
.deck-btn .stack.right{ text-align: right; }
.deck-btn .stack .k{ font-family: var(--mono); font-size: 9px; color: var(--ink-4); letter-spacing: .14em; text-transform: uppercase; }
.deck-btn .stack .v{ font-family: var(--mono); font-size: 11px; color: var(--ink); letter-spacing: .08em; text-transform: uppercase; }
.deck-btn-next{ justify-self: end; }
.deck-progress{ display:flex; align-items: center; justify-content: center; }
.deck-progress-track{ display:flex; gap: 4px; align-items: center; }
.tick{ width: 22px; height: 3px; background: var(--line); border-radius: 2px; cursor: pointer; transition: all .2s; }
.tick:hover{ background: var(--ink-3); }
.tick.past{ background: var(--ink-3); }
.tick.on{ width: 38px; background: var(--amber); box-shadow: 0 0 10px rgba(245,165,36,.4); }

/* type scale */
.eyebrow{ font-family: var(--mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); }
.eyebrow .dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--amber); margin-right: 10px; vertical-align: 2px; }
h1,h2,h3,h4{ font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; margin: 0; }
h1{ font-size: clamp(44px, 5.6vw, 88px); line-height: 0.98; letter-spacing: -0.03em; }
h2{ font-size: clamp(34px, 4.4vw, 64px); line-height: 1.02; letter-spacing: -0.02em; }
h3{ font-size: clamp(22px, 2vw, 28px); line-height: 1.15; }
.h-em{ font-style: italic; color: var(--amber-2); }
.h-strike{ color: var(--ink-3); text-decoration: line-through; text-decoration-color: rgba(255,255,255,.2); }
p.lead{ font-size: 18px; color: var(--ink-2); max-width: 62ch; }
.mono{ font-family: var(--mono); }
.num{ font-family: var(--mono); font-variant-numeric: tabular-nums; }

/* hero */
.hero{ min-height: 100%; display:flex; flex-direction: column; justify-content: space-between; padding: 40px 0 32px; overflow: hidden; position: relative; }
.hero::before{ content:''; position: absolute; inset: 0; background: var(--grad-warm); pointer-events: none; }
.hero .wrap{ flex: 1; display:flex; flex-direction: column; justify-content: center; position: relative; }
.hero-tag{ display:flex; align-items:center; gap: 20px; margin-bottom: 40px; }
.hero h1{ max-width: 18ch; }
.hero-sub{ display:flex; gap: 60px; margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--line); max-width: 860px; }
.hero-sub > div{ flex: 1; }
.hero-sub .k{ font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px; }
.hero-sub .v{ font-size: 14px; color: var(--ink-2); line-height: 1.5; }
.hero-foot{ display:flex; justify-content: space-between; align-items: flex-end; font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); padding-top: 24px; }
.hero-foot .rail{ display:flex; gap: 32px; }
.scroll-cue{ display:flex; align-items:center; gap: 10px; }
.scroll-cue .line{ width: 40px; height: 1px; background: var(--ink-3); position: relative; overflow:hidden; }
.scroll-cue .line::after{ content:''; position:absolute; left:-40px; top:0; width:40px; height:1px; background: var(--amber); animation: slide 2.2s infinite ease-in-out; }
@keyframes slide{ 0%{transform:translateX(0)} 60%{transform:translateX(80px)} 100%{transform:translateX(80px)} }

.grid-bg{ position: absolute; inset: 0; pointer-events: none; opacity: .35;
  background-image:
    linear-gradient(to right, rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse at 30% 40%, black 0%, transparent 70%);
}

/* section header */
.sec-head{ display:flex; justify-content: space-between; align-items: flex-end; padding: 40px 0 32px; gap: 80px; }
.sec-head .lbl{ font-family: var(--mono); font-size: 10px; letter-spacing: .18em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 18px; display:flex; align-items:center; gap: 14px; }
.sec-head .lbl .num-badge{ font-family: var(--mono); color: var(--amber); }
.sec-head .title{ max-width: 20ch; }
.sec-head .kicker{ max-width: 44ch; font-size: 16px; color: var(--ink-2); }

/* buttons / toggles */
.btn, button{ font-family: var(--mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; background: transparent; color: var(--ink); border: 1px solid var(--line-2); padding: 10px 16px; cursor: pointer; border-radius: 2px; transition: all .15s; }
.btn:hover, button:hover{ border-color: var(--ink-2); }
.btn.active, button.active{ background: var(--amber); color: #0A0B0D; border-color: var(--amber); }
.btn.ghost{ border-color: transparent; color: var(--ink-3); }
.btn.primary{ background: var(--amber); color: #0A0B0D; border-color: var(--amber); }
.btn.primary:hover{ background: var(--amber-2); }

.chip{ display:inline-flex; align-items:center; gap:8px; padding: 8px 12px; border: 1px solid var(--line-2); border-radius: 2px; font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-2); cursor: pointer; transition: all .15s; background: transparent; position: relative; }
.chip:hover{ border-color: var(--amber); color: var(--ink); transform: translateY(-1px); }
.chip.on{ border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
.chip .sw{ width: 8px; height: 8px; border-radius: 50%; background: var(--ink-4); }
.chip.on .sw{ background: var(--amber); box-shadow: 0 0 8px var(--amber); }

/* card */
.card{ background: var(--bg-1); border: 1px solid var(--line); border-radius: 4px; padding: 28px; position: relative; }
.card.glow{ background: linear-gradient(180deg, rgba(245,165,36,.05), var(--bg-1) 40%); }
.card.tight{ padding: 20px; }

/* bleed container */
.full{ max-width: 1440px; margin: 0 auto; padding: 0 40px; }

/* cursor-follow hover row behavior */
.row-hover{ transition: background .15s; }
.row-hover:hover{ background: rgba(255,255,255,.02); }

hr.rule{ border: 0; border-top: 1px solid var(--line); margin: 0; }

/* attention gap bars */
.bar-track{ height: 10px; background: var(--bg-2); border-radius: 1px; overflow: hidden; position: relative; }
.bar-fill{ height: 100%; background: var(--amber); transition: width 1.2s cubic-bezier(.2,.7,0,1); }
.bar-fill.dim{ background: var(--ink-4); }

/* tooltips */
.tt{ position: absolute; background: var(--bg-2); border: 1px solid var(--line-2); padding: 10px 12px; font-family: var(--mono); font-size: 11px; color: var(--ink); border-radius: 3px; pointer-events: none; z-index: 10; box-shadow: 0 12px 32px rgba(0,0,0,.5); white-space: nowrap; }

/* timeline */
.weekrow{ display:grid; grid-template-columns: 120px 1fr 120px 40px; gap: 24px; padding: 22px 0; border-top: 1px solid var(--line); cursor: pointer; align-items: start; }
.weekrow:hover{ background: rgba(255,255,255,.015); }
.weekrow.open{ background: rgba(245,165,36,.03); }
.weekrow .w-num{ font-family: var(--serif); font-size: 44px; color: var(--ink-3); line-height: 1; font-style: italic; }
.weekrow.open .w-num{ color: var(--amber); }
.weekrow .w-title{ font-family: var(--serif); font-size: 24px; line-height: 1.15; }
.weekrow .w-kpi{ font-family: var(--mono); font-size: 10px; letter-spacing: .08em; color: var(--ink-3); text-transform: uppercase; text-align: right; }
.weekrow .w-toggle{ color: var(--ink-3); font-family: var(--mono); text-align: right; }
.weekrow .w-detail{ grid-column: 2 / 4; overflow: hidden; max-height: 0; transition: max-height .4s ease, margin .3s ease; }
.weekrow.open .w-detail{ max-height: 600px; margin-top: 18px; }

/* network map */
.net-wrap{ position: relative; height: 640px; background:
  radial-gradient(ellipse at center, rgba(245,165,36,.04), transparent 60%),
  var(--bg-1); border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }

/* dashboard */
.tabs{ display:flex; gap: 2px; background: var(--bg-2); padding: 4px; border-radius: 3px; width: fit-content; }
.tab{ font-family: var(--mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; padding: 8px 14px; color: var(--ink-3); cursor: pointer; border-radius: 2px; transition: all .15s; border: 0; background: transparent; }
.tab.on{ background: var(--bg-3); color: var(--ink); }

.metric{ padding: 22px; border: 1px solid var(--line); border-radius: 3px; background: var(--bg-1); position: relative; }
.metric .lbl{ font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); }
.metric .val{ font-family: var(--serif); font-size: 40px; letter-spacing: -0.02em; margin: 8px 0; line-height: 1; }
.metric .delta{ font-family: var(--mono); font-size: 11px; color: var(--ok); }
.metric .delta.down{ color: var(--warn); }
.spark{ position: absolute; right: 16px; top: 16px; width: 60px; height: 24px; }

/* interactivity cues */
.hint{ display:inline-flex; align-items:center; gap: 6px; font-family: var(--mono); font-size: 10px; letter-spacing:.14em; text-transform: uppercase; color: var(--amber); padding: 4px 8px; border:1px solid var(--amber); border-radius: 2px; background: var(--amber-dim); }
.hint .pulse{ width: 6px; height: 6px; border-radius: 50%; background: var(--amber); box-shadow: 0 0 0 0 var(--amber); animation: pulse 1.8s infinite; }
@keyframes pulse{ 0%{ box-shadow: 0 0 0 0 rgba(245,165,36,.6);} 70%{ box-shadow: 0 0 0 10px rgba(245,165,36,0);} 100%{ box-shadow: 0 0 0 0 rgba(245,165,36,0);} }
.cursor-dot{ display:inline-block; width:8px; height:8px; border-radius:50%; background: var(--amber); margin-right: 6px; vertical-align: middle; }

/* gradient surface */
.surface{ background: var(--grad-panel), var(--bg-1); border:1px solid var(--line); border-radius: 4px; }

/* tier card */
.tier{ border: 1px solid var(--line); border-radius: 4px; padding: 28px; background: var(--bg-1); position: relative; transition: all .2s; }
.tier.on{ border-color: var(--amber); background: linear-gradient(180deg, rgba(245,165,36,.04), transparent 40%); }
.tier h3{ font-family: var(--serif); font-size: 32px; margin-bottom: 4px; }
.tier .price{ font-family: var(--serif); font-size: 56px; line-height: 1; letter-spacing: -0.02em; }
.tier .price .per{ font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: .1em; text-transform: uppercase; margin-left: 4px; }
.tier ul{ list-style: none; padding: 0; margin: 20px 0 0; }
.tier li{ padding: 10px 0; border-top: 1px solid var(--line); display:flex; gap: 12px; font-size: 13px; color: var(--ink-2); }
.tier li::before{ content:'+'; color: var(--amber); font-family: var(--mono); font-size: 11px; line-height: 1.6; }
.tier.off li{ opacity: .5; }

/* checklist */
.check-row{ display:grid; grid-template-columns: 32px 1fr auto; gap: 16px; padding: 20px 0; border-top: 1px solid var(--line); align-items: center; cursor: pointer; }
.check-row:hover{ background: rgba(255,255,255,.015); }
.check-box{ width: 18px; height: 18px; border: 1px solid var(--line-2); border-radius: 2px; display:grid; place-items:center; transition: all .15s; }
.check-row.done .check-box{ background: var(--amber); border-color: var(--amber); }
.check-row.done .check-box::after{ content:'✓'; color: #0A0B0D; font-size: 12px; font-weight: 700; }
.check-row .t{ font-family: var(--serif); font-size: 20px; line-height: 1.2; }
.check-row.done .t{ color: var(--ink-3); text-decoration: line-through; text-decoration-color: var(--ink-4); }
.check-row .when{ font-family: var(--mono); font-size: 10px; letter-spacing: .1em; color: var(--ink-3); text-transform: uppercase; }

/* theory of change */
.toc-col{ padding: 24px; border-left: 1px solid var(--line); min-height: 320px; position: relative; }
.toc-col:first-child{ border-left: 0; padding-left: 0; }
.toc-col .stage{ font-family: var(--mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--amber); }
.toc-col h4{ font-family: var(--serif); font-size: 22px; margin: 8px 0 16px; }
.toc-col ul{ list-style: none; padding: 0; margin: 0; }
.toc-col li{ font-size: 13px; color: var(--ink-2); padding: 8px 0; border-top: 1px dashed var(--line); }
.toc-col li:first-child{ border-top: 0; }
.flow-arrow{ position: absolute; right: -7px; top: 36px; color: var(--amber); font-family: var(--mono); font-size: 11px; }

/* footer */
footer{ padding: 80px 0 60px; border-top: 1px solid var(--line); color: var(--ink-3); font-family: var(--mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }
footer .ft-inner{ display:flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 32px; }

/* reveal animation */
.reveal{ opacity: 0; transform: translateY(18px); transition: opacity .7s ease, transform .7s cubic-bezier(.2,.7,0,1); }
.reveal.in{ opacity: 1; transform: none; }

/* responsive */
@media (max-width: 1100px){
  .deck-root{ grid-template-columns: 180px 1fr; }
  .deck-meta span:nth-child(1), .deck-meta span:nth-child(2){ display: none; }
}
@media (max-width: 860px){
  .deck-root{ grid-template-columns: 1fr; grid-template-areas: "top" "stage" "bottom"; }
  .deck-side{ display: none; }
  .wrap, .full{ padding: 0 24px; }
  .sec-head{ flex-direction: column; align-items: flex-start; gap: 24px; padding: 40px 0 32px; }
  .hero-sub{ flex-direction: column; gap: 28px; }
  .weekrow{ grid-template-columns: 80px 1fr 40px; }
  .weekrow .w-kpi{ display:none; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">

function CreatorNetwork(){
  const [activeSegs, setActiveSegs] = React.useState(Object.keys(SEG_META));
  const [hovered, setHovered] = React.useState(null);
  const [selected, setSelected] = React.useState(null);
  const [nodes, setNodes] = React.useState([]);

  const filtered = CREATORS.filter(c => activeSegs.includes(c.seg));
  const totalReach = filtered.reduce((a,c)=>a+c.reach, 0);
  const totalCreators = filtered.length;

  React.useEffect(()=>{
    const w = 1160, h = 640, cx = w/2, cy = h/2;
    const segs = Object.keys(SEG_META);
    // Seeded clusters arranged on an outer ring, each segment gets a cluster center.
    const clusterCenters = {};
    segs.forEach((s, i)=>{
      const angle = (i / segs.length) * Math.PI * 2 - Math.PI/2;
      const rx = 340, ry = 220;
      clusterCenters[s] = { x: cx + Math.cos(angle) * rx, y: cy + Math.sin(angle) * ry, angle };
    });
    const bySeg = {};
    CREATORS.forEach(c=>{ (bySeg[c.seg] = bySeg[c.seg] || []).push(c); });
    const placed = [];
    Object.entries(bySeg).forEach(([seg, group])=>{
      const center = clusterCenters[seg];
      // arrange nodes in a compact cluster around the center using a small spiral
      group.forEach((c, idx)=>{
        const spiralAngle = idx * 2.39996; // golden angle for even packing
        const spiralR = 14 + Math.sqrt(idx) * 22;
        const x = center.x + Math.cos(spiralAngle) * spiralR;
        const y = center.y + Math.sin(spiralAngle) * spiralR;
        const r = 5 + Math.sqrt(c.reach / 40000);
        placed.push({ ...c, x, y, r, clusterX: center.x, clusterY: center.y });
      });
    });
    setNodes(placed);

<script type="text/babel" data-presets="react">
/* === src/app.jsx === */
const CHAPTERS = [
  { id: 'hero',     num: '00', lbl: 'Open',        comp: 'Hero' },
  { id: 'proof',    num: '01', lbl: 'Proof',       comp: 'Proof' },
  { id: 'gap',      num: '02', lbl: 'The gap',     comp: 'AttentionGap' },
  { id: 'network',  num: '03', lbl: 'Network',     comp: 'CreatorNetwork' },
  { id: 'scope',    num: '04', lbl: 'Scope',       comp: 'ScopeToggles' },
  { id: 'timeline', num: '05', lbl: 'Timeline',    comp: 'Timeline' },
  { id: 'theory',   num: '06', lbl: 'Theory',      comp: 'TheoryOfChange' },
  { id: 'track',    num: '07', lbl: 'Tracking',    comp: 'Tracking' },
  { id: 'pricing',  num: '08', lbl: 'Terms',       comp: 'Pricing' },
  { id: 'closer',   num: '09', lbl: 'Close',       comp: 'Closer' },
];

function TopBar({ idx, setIdx }){
  return (
    <nav className="deck-top">
      <div className="deck-top-inner">
        <div className="brand">
          <span className="brand-mark">W</span>
          <span>WOW!<strong style={{color:'var(--amber)'}}>SGNL</strong></span>
          <span style={{ color:'var(--ink-4)', margin:'0 14px' }}>/</span>
          <span style={{ color:'var(--ink-3)' }}>Schumer 2028 · Independent-media advisory</span>
        </div>
        <div className="deck-meta">
          <span>Prepared / <em>Caleb Brock</em></span>
          <span>File / <em>TRI-SCH-28</em></span>
          <span className="deck-counter"><em className="num">{String(idx+1).padStart(2,'0')}</em><span className="sep"> / </span><span className="num" style={{color:'var(--ink-2)'}}>{String(CHAPTERS.length).padStart(2,'0')}</span></span>
        </div>
      </div>
    </nav>
  );
}

function SideIndex({ idx, setIdx }){
  return (
    <aside className="deck-side">
      <div className="side-lbl">Index</div>
      <ol className="side-list">
        {CHAPTERS.map((c, i)=>(
          <li key={c.id}
              className={`side-item ${i===idx?'on':''} ${i<idx?'past':''}`}
              onClick={()=>setIdx(i)}>
            <span className="side-num">{c.num}</span>
            <span className="side-lbl-txt">{c.lbl}</span>
            <span className="side-tick" />
          </li>
        ))}
      </ol>
      <div className="side-foot">
        <div className="side-key"><kbd>←</kbd><kbd>→</kbd> navigate</div>
        <div className="side-key"><kbd>1</kbd>–<kbd>9</kbd> jump</div>
      </div>
    </aside>
  );
}

function BottomBar({ idx, setIdx, direction }){
  const prev = CHAPTERS[idx-1];
  const next = CHAPTERS[idx+1];
  return (
    <div className="deck-bottom">
      <button
        className="deck-btn"
        disabled={!prev}
        onClick={()=> prev && setIdx(idx-1)}>
        <span className="arrow">←</span>
        <span className="stack">
          <span className="k">Previous</span>
          <span className="v">{prev ? `${prev.num} · ${prev.lbl}` : '—'}</span>
        </span>
      </button>
      <div className="deck-progress">
        <div className="deck-progress-track">
          {CHAPTERS.map((c,i)=>(
            <div key={c.id}
                 className={`tick ${i===idx?'on':''} ${i<idx?'past':''}`}
                 onClick={()=>setIdx(i)} />
          ))}
        </div>
      </div>
      <button
        className="deck-btn deck-btn-next"
        disabled={!next}
        onClick={()=> next && setIdx(idx+1)}>
        <span className="stack right">
          <span className="k">Next</span>
          <span className="v">{next ? `${next.num} · ${next.lbl}` : '—'}</span>
        </span>
        <span className="arrow">→</span>
      </button>
    </div>
  );
}

function App(){
  const [idx, setIdx] = useState(() => {
    const saved = parseInt(localStorage.getItem('deck-idx') || '0', 10);
    return Number.isFinite(saved) && saved>=0 && saved<CHAPTERS.length ? saved : 0;
  });
  const [direction, setDirection] = useState(1);
  const prevIdx = useRef(idx);

  const go = (n) => {
    const clamped = Math.max(0, Math.min(CHAPTERS.length-1, n));
    if (clamped === idx) return;
    setDirection(clamped > idx ? 1 : -1);
    prevIdx.current = idx;
    setIdx(clamped);
  };

  useEffect(()=>{
    localStorage.setItem('deck-idx', String(idx));
  }, [idx]);

  useEffect(()=>{
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); go(idx+1); }
      else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(idx-1); }
      else if (e.key === 'Home') go(0);
      else if (e.key === 'End') go(CHAPTERS.length-1);
      else if (/^[0-9]$/.test(e.key)) {
        const n = parseInt(e.key, 10);
        if (n>=1 && n<=CHAPTERS.length) go(n-1);
      }
    };
    window.addEventListener('keydown', onKey);
    return ()=> window.removeEventListener('keydown', onKey);
  }, [idx]);

  // touch swipe
  useEffect(()=>{
    let sx=0, sy=0, active=false;
    const start = (e) => { const t = e.touches[0]; sx=t.clientX; sy=t.clientY; active=true; };
    const end = (e) => {
      if (!active) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - sx, dy = t.clientY - sy;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.3) {
        if (dx < 0) go(idx+1); else go(idx-1);
      }
      active=false;
    };
    window.addEventListener('touchstart', start, { passive: true });
    window.addEventListener('touchend', end, { passive: true });
    return ()=> { window.removeEventListener('touchstart', start); window.removeEventListener('touchend', end); };
  }, [idx]);

  const chapter = CHAPTERS[idx];
  const Comp = window[chapter.comp];

  return (
    <div className="deck-root">
      <TopBar idx={idx} setIdx={go} />
      <SideIndex idx={idx} setIdx={go} />
      <main className="deck-stage" data-screen-label={`${chapter.num} ${chapter.lbl}`}>
        <div
          key={chapter.id}
          className={`deck-panel ${direction>0 ? 'enter-right' : 'enter-left'}`}
          data-chapter={chapter.id}>
          {Comp ? <Comp onNav={go} /> : <div style={{padding: 40}}>Missing: {chapter.comp}</div>}
        </div>
      </main>
      <BottomBar idx={idx} setIdx={go} direction={direction} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
