document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 color: var(--orange); border-color: var(--orange); background: var(--orange-tint); }\n  .read-time.urgent { color: var(--red); border-color: var(--red); background: rgba(233,75,60,0.08); }\n\n  /* prep-note under meta */\n  .prep-note {\n    margin: 14px 28px 0;\n    font-family: \"Inter Tight\", sans-serif;\n    font-size: 13px;\n    color: var(--muted);\n    letter-spacing: 0.01em;\n  }\n  @media (max-width: 640px) { .prep-note { margin: 12px 22px 0; font-size: 12.5px; } }\n\n  /* === DEPUTY POACH ALERT STRIP === */\n  .alert-strip {\n    margin: 22px 28px 0;\n    padding: 18px 22px 20px;\n    background: linear-gradient(180deg, rgba(233,75,60,0.08) 0%, rgba(244,123,63,0.04) 100%);\n    border: 1px solid var(--red);\n    border-left: 4px solid var(--red);\n    position: relative;\n  }\n  .alert-strip::before {\n    content: \"\";\n    position: absolute; top: 0; left: 0; right: 0; height: 2px;\n    background: linear-gradient(90deg, var(--red) 0%, var(--orange) 100%);\n  }\n  .alert-strip-head {\n    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;\n  }\n  .alert-pip {\n    display: inline-block; width: 9px; height: 9px; border-radius: 50%;\n    background: var(--red);\n    box-shadow: 0 0 0 0 rgba(233,75,60,0.5);\n    animation: alertPulse 1.8s ease-in-out infinite;\n  }\n  @keyframes alertPulse {\n    0%, 100% { box-shadow: 0 0 0 0 rgba(233,75,60,0.55); }\n    50%      { box-shadow: 0 0 0 8px rgba(233,75,60,0); }\n  }\n  .alert-kicker {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--red); font-weight: 600;\n  }\n  .alert-body {\n    font-family: \"Inter Tight\", sans-serif;\n    font-size: 16px; line-height: 1.5;\n    color: var(--ink); margin: 0;\n  }\n  .alert-body b { color: var(--navy-deep); }\n  @media (max-width: 640px) {\n    .alert-strip { margin: 18px 22px 0; padding: 14px 16px 16px; }\n    .alert-kicker { font-size: 10px; }\n    .alert-body { font-size: 14.5px; }\n  }\n  @media (prefers-reduced-motion: reduce) {\n    .alert-pip { animation: none; }\n  }\n\n  /* TOTAL row in mix table */\n  .sla tbody tr.total-row td { background: var(--navy); color: var(--cream); }\n  .sla tbody tr.total-row td .who { color: var(--navy-soft); }\n  .sla tbody tr.total-row td .turn { color: var(--orange); }\n\n  /* Why-us second proof block */\n  .why-second {\n    margin: 28px 0 0;\n    padding-top: 24px;\n    border-top: 1px solid rgba(250,247,241,0.18);\n    font-size: 16px; line-height: 1.55;\n    color: var(--cream); opacity: 0.92;\n    font-weight: 400;\n  }\n  .why-second .big {\n    font-family: \"Archivo Black\", sans-serif;\n    color: var(--orange);\n    border-bottom: 3px solid var(--teal);\n    padding-bottom: 1px;\n    white-space: nowrap;\n  }\n  .turn.red { color: var(--red); }\n\n  /* Tom Mode hint pulse */\n  .tom-hint {\n    position: absolute;\n    right: calc(100% + 10px);\n    top: 50%;\n    transform: translateY(-50%);\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 10px; letter-spacing: 0.14em;\n    color: var(--orange); text-transform: uppercase;\n    white-space: nowrap;\n    background: var(--cream);\n    padding: 5px 9px;\n    border: 1px solid var(--orange);\n    pointer-events: none;\n    opacity: 0;\n    animation: tomHintIn 600ms 1400ms cubic-bezier(.7,0,.2,1) forwards, tomHintPulse 2.4s 2200ms ease-in-out infinite;\n  }\n  .tom-hint::after {\n    content: \"\";\n    position: absolute;\n    left: 100%; top: 50%;\n    transform: translateY(-50%);\n    border: 5px solid transparent;\n    border-left-color: var(--orange);\n  }\n  @keyframes tomHintIn { to { opacity: 1; } }\n  @keyframes tomHintPulse {\n    0%, 100% { transform: translateY(-50%) translateX(0); }\n    50% { transform: translateY(-50%) translateX(-3px); }\n  }\n  body.tom-mode .tom-hint, body.tom-touched .tom-hint { display: none; }\n  @media (max-width: 640px) { .tom-hint { font-size: 9px; padding: 4px 7px; } ght: 600; }\n  .price-meta .min-fee b { color: var(--orange); font-weight: 600; }\n\n  /* mobile pricing */\n  .pcards { display: none; }\n  @media (max-width: 720px) {\n    .ptbl-wrap { display: none; }\n    .pcards { display: block; margin-top: 8px; }\n    .pcard {\n      border: 1px solid var(--navy);\n      background: var(--cream);\n      padding: 18px;\n      margin-bottom: 14px;\n      position: relative;\n    }\n    .pcard.recommended {\n      background: var(--orange-tint);\n      border-color: var(--orange);\n    }\n    .pcard.recommended::before {\n      content: \"\"; position: absolute; left: -1px; top: -1px; bottom: -1px;\n      width: 4px; background: var(--orange);\n    }\n    .pcard h4 { font-family: \"Archivo Black\", sans-serif; font-size: 17px; margin: 0 0 4px; color: var(--navy-deep); }\n    .pcard .sub {\n      font-family: \"JetBrains Mono\", monospace; font-size: 10px;\n      color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;\n      margin-bottom: 14px;\n    }\n    .pcard .row {\n      display: flex; justify-content: space-between;\n      padding: 8px 0; border-top: 1px solid var(--hairline);\n      font-family: \"JetBrains Mono\", monospace; font-size: 13px;\n    }\n    .pcard .row .lbl { color: var(--muted); letter-spacing: 0.06em; font-size: 11px; text-transform: uppercase; }\n    .pcard .badge {\n      position: absolute; top: 14px; right: 14px;\n      padding: 2px 8px; background: var(--orange); color: var(--cream);\n      font-family: \"JetBrains Mono\", monospace;\n      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;\n    }\n  }\n\n  /* === TERMS === */\n  .terms-list { list-style: none; margin: 0; padding: 0; border-top: 1px solid var(--hairline); }\n  .terms-list li {\n    display: grid; grid-template-columns: 170px 1fr;\n    gap: 22px; padding: 14px 0;\n    border-bottom: 1px solid var(--hairline);\n  }\n  @media (max-width: 640px) { .terms-list li { grid-template-columns: 1fr; gap: 4px; } }\ \", sans-serif;\n      font-size: 12px;\n      letter-spacing: 0.06em;\n      text-transform: uppercase;\n      border-right: none;\n    }\n    .cal-row .cell {\n      display: flex;\n      gap: 8px;\n      flex-wrap: wrap;\n      padding: 10px 14px;\n      border-right: none;\n      border-bottom: 1px dashed var(--hairline);\n      align-items: center;\n      position: relative;\n      padding-left: 48px;\n      min-height: 38px;\n    }\n    .cal-row .cell:last-child { border-bottom: none; }\n    .cal-row .cell::before {\n      content: attr(data-week);\n      position: absolute; left: 14px; top: 50%;\n      transform: translateY(-50%);\n      font-family: \"JetBrains Mono\", monospace;\n      font-size: 10px;\n      letter-spacing: 0.1em;\n      color: var(--muted);\n      text-transform: uppercase;\n      width: 24px;\n    }\n\n    /* === Dashboard: 1-up tiles, stacked bar rows === */\n    .dash { padding: 18px 16px; }\n    .dash-grid { grid-template-columns: 1fr 1fr; gap: 10px; }\n    .dash-tile { padding: 10px 12px; }\n    .dash-tile .val { font-size: 18px; }\n    .dash-bar-row {\n      grid-template-columns: 1fr;\n      gap: 4px;\n      padding: 8px 0;\n      border-bottom: 1px solid rgba(255,255,255,0.06);\n    }\n    .dash-bar-row .lbl { font-size: 9.5px; }\n    .dash-bar-row .num { text-align: left; font-size: 11px; }\n    .dash-head { gap: 6px; padding-bottom: 10px; margin-bottom: 12px; }\n    .dash-head .name { font-size: 12px; }\n    .dash-head .live { font-size: 9px; }\n    .example-chip { font-size: 8.5px; padding: 2px 6px; }\n\n    /* === Pricing row hover off, tighten cards === */\n    .ph-card { padding: 14px 16px; }\n    .ph-card .amt { font-size: clamp(22px, 7vw, 32px); }\n\n    /* === Terms list label color === */\n    .terms-list .k { font-size: 10px; letter-spacing: 0.16em; }\n    .terms-list .v { font-size: 14.5px; line-height: 1.5; }\n\n    /* === Sign block === */\n    .sign-urgency .when { font-size: clamp(24px, 7vw, 32px); line-height: 1.1    .sla tbody td { padding-left: 0; }\n    .sla tbody td::before {\n      position: static;\n      display: block;\n      width: auto;\n      margin-bottom: 2px;\n    }\n\n    /* Examples player chrome tighter */\n    .ex-thumb-label { font-size: 18px; }\n    .ex-spon { font-size: 8px; padding: 3px 36px; right: -34px; top: 12px; }\n    .ex-paused { font-size: 8px; padding: 3px 6px; }\n    .ex-time { font-size: 8.5px; }\n    .ex-meta { gap: 8px; }\n    .ex-avatar { width: 32px; height: 32px; font-size: 11px; }\n    .ex-handle .h { font-size: 12.5px; }\n    .ex-handle .s { font-size: 9px; }\n    .ex-quote { font-size: 13px; padding-left: 10px; }\n    .ex-then { font-size: 12px; }\n\n    /* Section nums smaller */\n    .s-num { font-size: 10px; }\n    .s-tab { font-size: 9.5px; padding: 3px 8px; }\n    .s-title { font-size: clamp(22px, 7vw, 30px); }\n\n    /* Lanes — single column for pure focus */\n    .lanes { gap: 10px; }\n    .lane-card { padding: 12px 13px 11px; }\n    .lane-foot .count { font-size: 16px; }\n  }\n\n  /* Touch hover-state cleanup */\n  @media (hover: none) {\n    .ex-card:hover, .lane-card:hover, .ptbl tbody tr:hover { transform: none; box-shadow: none; }\n    .ptbl tbody tr:hover td { background: transparent; }\n    .ptbl tbody tr.recommended:hover td { background: var(--orange-tint); }\n  }\n\n  @media (prefers-reduced-motion: reduce) {\n    *, *::before, *::after {\n      animation-duration: 0.001ms !important;\n      transition-duration: 0.001ms !important;\n    }\n    .reveal { opacity: 1; transform: none; }\n    .stripes-h > span, .mast-stripes span { transform: scaleX(1); }\n    .load-fade { opacity: 1; transform: none; }\n  }\n  :focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"watermark\" aria-hidden=\"true\">CONFIDENTIAL<\u002Fdiv>\n<div class=\"watermark r\" aria-hidden=\"true\">CONFIDENTIAL<\u002Fdiv>\n\n<!-- Rotate-phone overlay removed v4: portrait-first mobile design -->\n\n<!-- Top chrome -->\n<div class=\"top-chrome\">\n  <div class=\"progress\" aria-hidden=\"true\"><div class=\"progress-fill\" id=\"progress\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"chrome-bar\">\n    <div class=\"read-time\" id=\"readTime\" aria-live=\"polite\">~7 min read<\u002Fdiv>\n    <button class=\"tom-toggle\" id=\"tomToggle\" aria-pressed=\"true\" aria-label=\"Toggle Tom Mode — executive summary view\">\n      <span class=\"label\">Tom Mode<\u002Fspan>\n      <span class=\"switch\" aria-hidden=\"true\">\n        <span class=\"seg s1\"><\u002Fspan><span class=\"seg s2\"><\u002Fspan><span class=\"seg s3\"><\u002Fspan>\n        <span class=\"knob\"><\u002Fspan>\n      <\u002Fspan>\n      <span class=\"tom-hint\" id=\"tomHint\">75-sec exec view →<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\">\n\n  <!-- MASTHEAD -->\n  <header class=\"masthead\">\n    <div class=\"mast-stripes\" aria-hidden=\"true\">\n      <span class=\"s1\"><\u002Fspan>\n      <span class=\"s2\"><\u002Fspan>\n      <span class=\"s3\"><\u002Fspan>\n    <\u002Fdiv>\n    <p class=\"kicker load-fade d1\">Proposal <span class=\"dot\">·<\u002Fspan> Confidential <span class=\"dot\">·<\u002Fspan> No. 2026-04-24<\u002Fp>\n    <h1 class=\"wordmark load-fade d2\">WOW<span class=\"bang\">!<\u002Fspan>SGNL<\u002Fh1>\n    <h2 class=\"title load-fade d3\">Steyer for California — <span class=\"em\">YouTube Creator Blitz.<\u002Fspan> A 30-day, Latino-weighted, culture-creator distribution campaign for the final stretch of the primary.<\u002Fh2>\n  <\u002Fheader>\n  <div class=\"mast-rule\"><\u002Fdiv>\n  <div class=\"stripes-h\" aria-hidden=\"true\">\n    <span class=\"s1\"><\u002Fspan>\n    <span class=\"s2\"><\u002Fspan>\n    <span class=\"s3\"><\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- META -->\n  <div class=\"meta load-fade d4\">\n    <div><span class=\"k\">To<\u002Fspan><span>Kori Schulman · Steyer 2026<\u002Fspan><\u002Fdiv>\n    <div><span class=\"k\">From<\u002Fspan><span>Caleb Brock · WOW!SGNL<\u002Fspan><\u002Fdiv>\n    <div><span class=\"k\">Date<\u002Fspan><span>April 27, 2026 · Monday<\u002Fspan><\u002Fdiv>\n    <div><span class=\"k\">Re<\u002Fspan><span>Final 30 — Creator Read Blitz<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"prep-note load-fade d4\"><em>Prepared for principal review.<\u002Fem><\u002Fp>\n\n  <!-- COMPETITIVE PRESSURE ALERT -->\n  <aside class=\"alert-strip load-fade d4\" role=\"note\" aria-label=\"Time-sensitive update\">\n    <div class=\"alert-strip-head\">\n      <span class=\"alert-pip\" aria-hidden=\"true\"><\u002Fspan>\n      <span class=\"alert-kicker\">Time-sensitive · Sun Apr 26 / Mon Apr 27<\u002Fspan>\n    <\u002Fdiv>\n    <p class=\"alert-body\">Competitive booking pressure is real. Multiple California and national campaigns are now moving into the same creator pool. <b>The earlier the campaign authorizes outreach, the more leverage we have on price, availability, and exclusivity.<\u002Fb> Lock by Friday, May 1; next week we walk in with the full slate of creators, lanes, and drops approved.<\u002Fp>\n  <\u002Faside>\n\n  <!-- 01 SITUATION -->\n  <section class=\"s reveal\" id=\"s1\">\n    <div class=\"s-num\">§ 01 — Situation<\u002Fdiv>\n    <span class=\"s-tab\">For Governor<\u002Fspan>\n    <h3 class=\"s-title\">Where we are.<\u002Fh3>\n    <div class=\"s-rule\" aria-hidden=\"true\"><span class=\"s1\"><\u002Fspan><span class=\"s2\"><\u002Fspan><span class=\"s3\"><\u002Fspan><\u002Fdiv>\n\n    <p class=\"lede\">The race is closing. Becerra-aligned activity is now moving through paid and creator channels — the kind of movement this fast doesn't happen organically. The countermove has to happen <span class=\"em-orange\">inside the same channels<\u002Fspan>: at scale, with native voices, in the next 30 days.<\u002Fp>\n\n    <p class=\"lede\">Not another political-influencer push. <span class=\"em-navy\">California Democratic primary voters — especially the Latino bloc moving toward Becerra — don't live in the political feed. They live everywhere else.<\u002Fspan> The bet is to put Steyer inside the YouTubers they're actually watching. Comedians. Cooks. Lowriders. Music. Sports. Faith. Family. Across the seven verticals where the campaign's TV and programmatic buys never reach.<\u002Fp>\n\n    <p class=\"lede\"><span class=\"em-navy\">Recommended path:<\u002Fspan> a 30-day YouTube creator blitz, ~40 creators across 7 verticals, Latino-weighted, in-market within 7–10 days of signing. What it takes to do this right is below.<\u002Fp>\n\n    <div class=\"keystats\">\n      <div class=\"keystat\"><div class=\"lbl\">Window<\u002Fdiv><div class=\"val\">30 days<\u002Fdiv><\u002Fdiv>\n      <div class=\"keystat\"><div class=\"lbl\">Creators<\u002Fdiv><div class=\"val\">~40<\u002Fdiv><\u002Fdiv>\n      <div class=\"keystat\"><div class=\"lbl\">Verticals<\u002Fdiv><div class=\"val\">7 + floor<\u002Fdiv><\u002Fdiv>\n      <div class=\"keystat\"><div class=\"lbl\">Primary<\u002Fdiv><div class=\"val\">Jun 02<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"body full-only\"><b>Sign this week. In-market May 1.<\u002Fb> It's Monday, April 27. We have five business days. Top California creator inventory in the final 30 days is finite — and it's being hunted. We're working alongside other clients running into the same talent pool right now: House primaries, Senate races, gubernatorial campaigns across the country. Bookings locked by Friday hold today's rates. Every business day past May 1 is a creator we cannot recover.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 02 STRATEGIC BET -->\n  <section class=\"s reveal\" id=\"s2\">\n    <div class=\"s-num\">§ 02 — The Bet<\u002Fdiv>\n    <span class=\"s-tab\">For Governor<\u002Fspan>\n    <h3 class=\"s-title\">The strategic bet.<\u002Fh3>\n    <div class=\"s-rule\" aria-hidden=\"true\"><span class=\"s1\"><\u002Fspan><span class=\"s2\"><\u002Fspan><span class=\"s3\"><\u002Fspan><\u002Fdiv>\n\n    <p class=\"lede\">Forget the obvious political-creator playbook — the influencer feed that makes campaigns feel productive without moving voters. We buy <span class=\"em-orange\">35 culture creators<\u002Fspan>: the non-obvious ones whose audiences have never heard them talk politics.<\u002Fp>\n\n    <p class=\"lede\"><b>Think of how War Thunder, Raid: Shadow Legends, NordVPN, or Squarespace get advertised on YouTube.<\u002Fb> A creator pauses their video — a recipe, a vlog, a lowrider build, a fútbol recap — and reads a sponsored message in their own voice. The audience watched because they showed up for the creator. The sponsor message lands inside the trust the creator has already built. <span class=\"em-navy\">That's the format. That's what we're buying. Just for Tom Steyer instead of a video game.<\u002Fspan><\u002Fp>\n\n    <h4 class=\"ex-title\">What this looks like in practice.<\u002Fh4>\n    <p class=\"ex-sub\">Three illustrative moments — what a viewer actually sees<\u002Fp>\n    <div class=\"examples\">\n      <!-- Example 01 -->\n      <div class=\"ex-card\">\n        <div class=\"ex-player p1\">\n          <div class=\"ex-spon\">Sponsored<\u002Fdiv>\n          <div class=\"ex-paused\">Paused · 2:14<\u002Fdiv>\n          <div class=\"ex-thumb\"><div class=\"ex-thumb-label\">\"REAL QUICK<br>BEFORE WE GO ON…\"<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex-scrub\">\n            <div class=\"ex-bar b1\"><\u002Fdiv>\n            <div class=\"ex-time\">2:14 / 12:08<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ex-body\">\n          <div class=\"ex-meta\">\n            <div class=\"ex-avatar a1\">FE<\u002Fdiv>\n            <div class=\"ex-handle\">\n              <div class=\"h\">LA Mexican-American comedian<\u002Fdiv>\n              <div class=\"s\">2.4M SUBS · STAND-UP / SKETCH<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"ex-num\">01<\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"ex-quote\">\"Real quick, this video is brought to you by <em>Tom Steyer<\u002Fem>. You probably know him — climate guy, ran for president, now he's running for governor of California. The reason I said yes to this…\"<\u002Fp>\n          <p class=\"ex-then\"><b>Then 60 seconds<\u002Fb> in his voice on why Steyer matters for working Californians. Then back to the bit.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Example 02 -->\n      <div class=\"ex-card\">\n        <div class=\"ex-player p2\">\n          <div class=\"ex-spon\">Sponsored<\u002Fdiv>\n          <div class=\"ex-paused\">Paused · 4:32<\u002Fdiv>\n          <div class=\"ex-thumb\"><div class=\"ex-thumb-label\">\"ANTES DE<br>SEGUIR…\"<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex-scrub\">\n            <div class=\"ex-bar b2\"><\u002Fdiv>\n            <div class=\"ex-time\">4:32 / 10:50<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ex-body\">\n          <div class=\"ex-meta\">\n            <div class=\"ex-avatar a2\">RM<\u002Fdiv>\n            <div class=\"ex-handle\">\n              <div class=\"h\">Regional Mexicano music channel<\u002Fdiv>\n              <div class=\"s\">1.1M SUBS · CHARTS / BEHIND-THE-MUSIC<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"ex-num\">02<\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"ex-quote\">\"Antes de seguir — este video es presentado por <em>Tom Steyer<\u002Fem>, candidato a gobernador de California…\"<\u002Fp>\n          <p class=\"ex-then\"><b>Then 75 seconds<\u002Fb> in Spanish on housing, jobs, and immigration. Clear paid-for disclaimer. Then back to the music.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Example 03 -->\n      <div class=\"ex-card\">\n        <div class=\"ex-player p3\">\n          <div class=\"ex-spon\">Sponsored<\u002Fdiv>\n          <div class=\"ex-paused\">Paused · 7:08<\u002Fdiv>\n          <div class=\"ex-thumb\"><div class=\"ex-thumb-label\">\"QUICK BREAK —<br>I TOOK THIS ONE…\"<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex-scrub\">\n            <div class=\"ex-bar b3\"><\u002Fdiv>\n            <div class=\"ex-time\">7:08 / 12:42<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ex-body\">\n          <div class=\"ex-meta\">\n            <div class=\"ex-avatar a3\">LK<\u002Fdiv>\n            <div class=\"ex-handle\">\n              <div class=\"h\">Lakers-orbit YouTuber<\u002Fdiv>\n              <div class=\"s\">820K SUBS · GAME RECAPS / NBA TAKES<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"ex-num\">03<\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"ex-quote\">\"Quick break — this video is sponsored by <em>Tom Steyer<\u002Fem>, who's running for governor. I'm not a political guy, but here's why I took this…\"<\u002Fp>\n          <p class=\"ex-then\"><b>Then 60 seconds<\u002Fb> native to his voice. Then back to the recap.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"body full-only\" style=\"margin-top:18px;max-width:760px;\"><b>The audience knows it's an ad.<\u002Fb> That's the whole point — same way they know the Squarespace ad on a tech reviewer's video is an ad. The trust transfer happens because the creator chose to associate themselves with the message. Native context, clear disclosure, real voice.<\u002Fp>\n\n    <div class=\"full-only\">\n      <p class=\"body\"><b>Cultural authenticity, not political celebrity.<\u002Fb> The Latino bloc in California is the most fluctuating cohort in the cycle. Public polling consistently shows younger Latino voters don't respond to political-creator content the way older cohorts do — they respond to people who already live in their feeds for non-political reasons. The bet lands inside earned trust the political feed has already burned through.<\u002Fp>\n      <p class=\"body\"><b>Seven categories, pre-vetted and ready to book.<\u002Fb> Mexican-American comedy. LA lifestyle / vlog. Food and restaurant creators. Música urbana and regional Mexicano. Faith and family. Auto and lowrider culture. Sports-adjacent (boxing, fútbol, Lakers-orbit). Our roster ladders into each of these so the campaign shows up in the feed contexts the political pollsters never see.<\u002Fp>\n      <p class=\"body\"><b>Geographic logic.<\u002Fb> LA County leads, with overlay weight on the Inland Empire and Central Valley. We calibrate to whatever turnout targeting your data team is already running — we are not introducing our own polling story.<\u002Fp>\n      <p class=\"body\"><b>The 5-creator political floor.<\u002Fb> Underneath the 35 culture creators we hold a small floor of 5 explicitly political YouTubers — for speed, FPPC compliance baseline, and a clean campaign-aligned voice on the political feed. They are not the strategy. The strategy is <b>saturation<\u002Fb>: any California Democratic primary voter watching the top YouTubers in their feed encounters Steyer somewhere during the final 30 days. Comedy. Lifestyle. Food. Music. Faith. Lowrider. Sports. The whole feed lights up.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Roster grid: 7 culture verticals as info-rich cards -->\n    <div class=\"roster-head\">\n      <h4>The roster — seven verticals, pre-vetted and ready to book.<\u002Fh4>\n      <span class=\"meta\">35 culture · 5 political floor · 40 total<\u002Fspan>\n    <\u002Fdiv>\n    <p class=\"roster-sub\">Indicative names from our 100-creator longlist · Final roster locked the week of signing<\u002Fp>\n    <div class=\"lanes\">\n      <div class=\"lane-card l1\">\n        <div class=\"lane-top\"><div class=\"lane-name\">Comedy<\u002Fdiv><div class=\"lane-idx\">01 / 07<\u002Fdiv><\u002Fdiv>\n        <ul class=\"lane-creators\">\n          <li>Felipe Esparza<span class=\"who\">stand-up · East LA<\u002Fspan><\u002Fli>\n          <li>Jesús Trejo<span class=\"who\">comedy specials · LA<\u002Fspan><\u002Fli>\n          <li>Cristela Alonzo<span class=\"who\">stand-up · sketch<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"lane-foot\"><div class=\"count\">~6<\u002Fdiv><div class=\"mix\"><b>5 reads<\u002Fb><br>+ 1 video<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"lane-card l2\">\n        <div class=\"lane-top\"><div class=\"lane-name\">LA Lifestyle<\u002Fdiv><div class=\"lane-idx\">02 / 07<\u002Fdiv><\u002Fdiv>\n        <ul class=\"lane-creators\">\n          <li>Brittany Broski<span class=\"who\">commentary · LA<\u002Fspan><\u002Fli>\n          <li>Smosh-orbit creators<span class=\"who\">vlog network<\u002Fspan><\u002Fli>\n          <li>CA-vlogger circle<span class=\"who\">day-in-the-life<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"lane-foot\"><div class=\"count\">~5<\u002Fdiv><div class=\"mix\"><b>4 reads<\u002Fb><br>+ 1 video<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"lane-card l3\">\n        <div class=\"lane-top\"><div class=\"lane-name\">Food<\u002Fdiv><div class=\"lane-idx\">03 / 07<\u002Fdiv><\u002Fdiv>\n        <ul class=\"lane-creators\">\n          <li>Joshua Weissman<span class=\"who\">recipes · cooking<\u002Fspan><\u002Fli>\n          <li>Ranch-style food channels<span class=\"who\">CA / TX-Mex<\u002Fspan><\u002Fli>\n          <li>Mexican-restaurant creators<span class=\"who\">behind-the-counter<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"lane-foot\"><div class=\"count\">~5<\u002Fdiv><div class=\"mix\"><b>5 reads<\u002Fb><br>only<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"lane-card l4\">\n        <div class=\"lane-top\"><div class=\"lane-name\">Música<\u002Fdiv><div class=\"lane-idx\">04 / 07<\u002Fdiv><\u002Fdiv>\n        <ul class=\"lane-creators\">\n          <li>Becky G channel<span class=\"who\">música urbana<\u002Fspan><\u002Fli>\n          <li>Cuco-orbit creators<span class=\"who\">behind-the-music<\u002Fspan><\u002Fli>\n          <li>Regional Mexicano network<span class=\"who\">artist channels<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"lane-foot\"><div class=\"count\">~5<\u002Fdiv><div class=\"mix\"><b>3 reads<\u002Fb><br>+ 2 video<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"lane-card l5\">\n        <div class=\"lane-top\"><div class=\"lane-name\">Faith &amp; Family<\u002Fdiv><div class=\"lane-idx\">05 / 07<\u002Fdiv><\u002Fdiv>\n        <ul class=\"lane-creators\">\n          <li>David Lopez Films-tier<span class=\"who\">family · values<\u002Fspan><\u002Fli>\n          <li>Spanglish family-vlog<span class=\"who\">parenting<\u002Fspan><\u002Fli>\n          <li>Faith creators · LA / IE<span class=\"who\">testimony · community<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"lane-foot\"><div class=\"count\">~5<\u002Fdiv><div class=\"mix\"><b>5 reads<\u002Fb><br>only<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"lane-card l6\">\n        <div class=\"lane-top\"><div class=\"lane-name\">Auto / Lowrider<\u002Fdiv><div class=\"lane-idx\">06 / 07<\u002Fdiv><\u002Fdiv>\n        <ul class=\"lane-creators\">\n          <li>Lowrider-culture YouTubers<span class=\"who\">build vlogs · meet-ups<\u002Fspan><\u002Fli>\n          <li>Regional auto-build channels<span class=\"who\">SoCal · Central Valley<\u002Fspan><\u002Fli>\n          <li>Car-meet creators<span class=\"who\">scene · lifestyle<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"lane-foot\"><div class=\"count\">~5<\u002Fdiv><div class=\"mix\"><b>5 reads<\u002Fb><br>only<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"lane-card l7\">\n        <div class=\"lane-top\"><div class=\"lane-name\">Sports-Adjacent<\u002Fdiv><div class=\"lane-idx\">07 / 07<\u002Fdiv><\u002Fdiv>\n        <ul class=\"lane-creators\">\n          <li>Lakers-orbit creators<span class=\"who\">recaps · NBA takes<\u002Fspan><\u002Fli>\n          <li>Boxing channels<span class=\"who\">Mexican-American boxing<\u002Fspan><\u002Fli>\n          <li>Fútbol commentary<span class=\"who\">Liga MX · USMNT<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"lane-foot\"><div class=\"count\">~4<\u002Fdiv><div class=\"mix\"><b>3 reads<\u002Fb><br>+ 1 video<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"lane-card l2\">\n        <div class=\"lane-top\"><div class=\"lane-name\">Political Floor<\u002Fdiv><div class=\"lane-idx\">+ 5<\u002Fdiv><\u002Fdiv>\n        <ul class=\"lane-creators\">\n          <li>5 explicitly political YouTubers<span class=\"who\">campaign-news beat<\u002Fspan><\u002Fli>\n          <li>FPPC-baseline coverage<span class=\"who\">speed · compliance<\u002Fspan><\u002Fli>\n          <li>Not the strategy<span class=\"who\">— the strategy is saturation<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div class=\"lane-foot\"><div class=\"count\">5<\u002Fdiv><div class=\"mix\">support<br>layer<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"roster-total\">\n      <span class=\"lbl\">Saturation Logic<\u002Fspan>\n      <span class=\"val\">Any CA Dem primary voter watching top YouTubers in the final 30 days <span class=\"accent\">encounters Steyer somewhere.<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 SCOPE -->\n  <section class=\"s reveal\" id=\"s3\">\n    <div class=\"s-num\">§ 03 — Scope<\u002Fdiv>\n    <span class=\"s-tab\">For Governor<\u002Fspan>\n    <h3 class=\"s-title\">Five workstreams.<\u002Fh3>\n    <div class=\"s-rule\" aria-hidden=\"true\"><span class=\"s1\"><\u002Fspan><span class=\"s2\"><\u002Fspan><span class=\"s3\"><\u002Fspan><\u002Fdiv>\n\n    <ol class=\"ws-list\">\n      <li class=\"ws-item\">\n        <div class=\"ws-num\">01<\u002Fdiv>\n        <div>\n          <h4 class=\"ws-title\">Sourcing &amp; Diligence<\u002Fh4>\n          <p class=\"ws-detail full-only\">A 100-creator longlist already built — Latino-weighted across Mexican-American comedy, LA lifestyle, food, música urbana, faith and family, auto/lowrider, and sports-adjacent verticals. Vetting against a structured disqualifier framework: brand safety, prior political activity, California compliance eligibility and platform eligibility, audience overlap with Dem primary voters, recent CPM, and comment-section health. 100-creator longlist → finalist pool → ~40-creator booked roster, finalized the week of signing.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fli>\n      <li class=\"ws-item\">\n        <div class=\"ws-num\">02<\u002Fdiv>\n        <div>\n          <h4 class=\"ws-title\">Creative Direction<\u002Fh4>\n          <p class=\"ws-detail full-only\">Talking-points framework written off your existing comms doctrine. Three creator-voice lanes — cultural / personal / civic — so the same beat lands seven different ways across categories. Per-creator script collaboration with on-brand off-brand calibration so it does not feel like \"the candidate paid them.\"<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fli>\n      <li class=\"ws-item\">\n        <div class=\"ws-num\">03<\u002Fdiv>\n        <div>\n          <h4 class=\"ws-title\">FPPC Compliance &amp; Vendor Setup<\u002Fh4>\n          <p class=\"ws-detail full-only\">All creator engagements are booked through the Steyer for California committee. We work directly with your campaign counsel and accounting firm to ensure every booking clears their compliance review before money moves. For each creator we deliver a clean packet — W-9, full creator address for Schedule E/G reporting, signed agreement with California paid third-party influencer disclosure language built into the read, and a draft 1099-NEC line item. Your firm handles disbursement, recordkeeping, and FPPC/Form 460 filings; we sit alongside that workflow as the vendor on the creative side, delivering paperwork ready to process. Forty creators in 30 days is heavy paperwork volume — that's why this lives inside the campaign's existing accounting infrastructure, not a third-party shop standing it up from scratch.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fli>\n      <li class=\"ws-item\">\n        <div class=\"ws-num\">04<\u002Fdiv>\n        <div>\n          <h4 class=\"ws-title\">Trafficking<\u002Fh4>\n          <p class=\"ws-detail full-only\">Booking, contracting, payment rails, drop scheduling against the 30-day arc, redundancy buffers for cancellations and creator-side delays. Single source of truth in the campaign-shared dashboard (mocked below).<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fli>\n      <li class=\"ws-item\">\n        <div class=\"ws-num\">05<\u002Fdiv>\n        <div>\n          <h4 class=\"ws-title\">Intelligence &amp; Reporting<\u002Fh4>\n          <p class=\"ws-detail full-only\">Weekly performance brief covering published view counts, comment-sentiment scan, narrative-environment monitoring on opposition-creator activity, and creator-by-creator delivery status. We report what's public — view counts, engagement, comment health, content adjacency. Where creators share backend YouTube Analytics with us, we incorporate watch-through and audience demographics into the brief. We do not fabricate metrics we cannot verify.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fli>\n    <\u002Fol>\n  <\u002Fsection>\n\n  <!-- 04 TIMELINE -->\n  <section class=\"s reveal\" id=\"s4\">\n    <div class=\"s-num\">§ 04 — Timeline<\u002Fdiv>\n    <span class=\"s-tab\">For Governor<\u002Fspan>\n    <h3 class=\"s-title\">The 30-day arc.<\u002Fh3>\n    <div class=\"s-rule\" aria-hidden=\"true\"><span class=\"s1\"><\u002Fspan><span class=\"s2\"><\u002Fspan><span class=\"s3\"><\u002Fspan><\u002Fdiv>\n\n    <div class=\"timeline\" id=\"timeline\">\n      <div class=\"timeline-line\" aria-hidden=\"true\"><\u002Fdiv>\n      <div class=\"timeline-track\" role=\"list\" aria-label=\"Campaign timeline\">\n        <div class=\"tl-node major\" role=\"listitem\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">Sign<\u002Fdiv><\u002Fdiv>\n        <div class=\"tl-node\" role=\"listitem\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">W1<\u002Fdiv><\u002Fdiv>\n        <div class=\"tl-node major\" role=\"listitem\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">In-Market<\u002Fdiv><\u002Fdiv>\n        <div class=\"tl-node\" role=\"listitem\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">W3<\u002Fdiv><\u002Fdiv>\n        <div class=\"tl-node major\" role=\"listitem\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">Peak Push<\u002Fdiv><\u002Fdiv>\n        <div class=\"tl-node\" role=\"listitem\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">W5<\u002Fdiv><\u002Fdiv>\n        <div class=\"tl-node major\" role=\"listitem\"><div class=\"tl-dot\"><\u002Fdiv><div class=\"tl-label\">Jun 02<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"tl-detail-grid full-only\">\n        <div class=\"tl-detail\">\n          <div class=\"week\">Day 0 — Fri May 1 — Sign<\u002Fdiv>\n          <h4>Contract execution.<\u002Fh4>\n          <p>Contract execution by Friday, May 1. WOW!SGNL retainer invoiced on signing. Sourcing list shifts from cold to active outreach within 24 hours. Creator booking and payment workflow live on the campaign side from Day 1.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"tl-detail\">\n          <div class=\"week\">Day 1–7 — May 2–8 — Sprint<\u002Fdiv>\n          <h4>Booking + creative.<\u002Fh4>\n          <p>~40 creators contracted, scripts in motion, first compliance pass complete, FPPC paperwork inbound. Sync with the campaign's comms lead twice in Week 1 (Monday + Thursday). After Week 1: weekly Monday sync plus a live shared tracker accessible to Kori and the comms lead at all times.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"tl-detail\">\n          <div class=\"week\">Day 7–10 — May 8–11 — In-Market<\u002Fdiv>\n          <h4>First spots live.<\u002Fh4>\n          <p>Tier 1 culture creators publish. Shared tracker goes live to Kori, comms lead, and data lead. First narrative-environment scan against opposition response.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"tl-detail\">\n          <div class=\"week\">Day 10–22 — Peak Push<\u002Fdiv>\n          <h4>Saturation.<\u002Fh4>\n          <p>70% of creator volume publishes in this window. LA-County frequency targeting. Mid-flight platform-metrics read against the campaign's own polling.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"tl-detail\">\n          <div class=\"week\">Day 22–30 — Close<\u002Fdiv>\n          <h4>Get-out-the-vote.<\u002Fh4>\n          <p>Civic-lane creative dominates. Final political-floor creators activate on the campaign-news beat. Drop schedule weighted heaviest from T-7 through T-1.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"tl-detail\">\n          <div class=\"week\">Jun 02, 2026 — Election Day<\u002Fdiv>\n          <h4>Read &amp; report.<\u002Fh4>\n          <p>Real-time delivery audit. Final platform-metrics memo within 5 days. Reconciliation packet within 14 days.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DROP CALENDAR -->\n    <div class=\"full-only\">\n      <h4 style=\"font-family:'Archivo Black',sans-serif;letter-spacing:-0.005em;color:var(--navy-deep);margin:48px 0 4px;font-size:18px;\">Drop schedule, by week and lane.<\u002Fh4>\n      <p class=\"body\" style=\"color:var(--ink);font-size:14px;margin-bottom:14px;\">~40 bookings across seven culture lanes plus a five-creator political floor. Every booking is a 60–90s creator-voice endorsement — either narrated over campaign-supplied B-roll, or filmed selfie-style by the creator. Volume builds toward T-1.<\u002Fp>\n      <div class=\"calendar\" role=\"table\" aria-label=\"Drop schedule by week\">\n        <div class=\"cal-head\" role=\"row\">\n          <div role=\"columnheader\">Lane<\u002Fdiv>\n          <div role=\"columnheader\">W1 · Sprint<\u002Fdiv>\n          <div role=\"columnheader\">W2 · In-Market<\u002Fdiv>\n          <div role=\"columnheader\">W3 · Peak<\u002Fdiv>\n          <div role=\"columnheader\">W4 · Peak<\u002Fdiv>\n          <div role=\"columnheader\">W5 · Close<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cal-row\" role=\"row\">\n          <div class=\"lane\">Comedy<\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×2<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cal-row\" role=\"row\">\n          <div class=\"lane\">LA Lifestyle<\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cal-row\" role=\"row\">\n          <div class=\"lane\">Food<\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cal-row\" role=\"row\">\n          <div class=\"lane\">Música<\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cal-row\" role=\"row\">\n          <div class=\"lane\">Faith &amp; Family<\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cal-row\" role=\"row\">\n          <div class=\"lane\">Auto / Lowrider<\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cal-row\" role=\"row\">\n          <div class=\"lane\">Sports-Adjacent<\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill\">read ×1<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cal-row\" role=\"row\">\n          <div class=\"lane\">Political Floor<\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill red\">floor ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill red\">floor ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill red\">floor ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill red\">floor ×1<\u002Fspan><\u002Fdiv>\n          <div class=\"cell\"><span class=\"pill red\">floor ×1<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 OPERATIONS -->\n  <section class=\"s reveal full-only\" id=\"s-ops\">\n    <div class=\"s-num\">§ 05 — Operations<\u002Fdiv>\n    <span class=\"s-tab\">For Governor<\u002Fspan>\n    <h3 class=\"s-title\">How it actually runs.<\u002Fh3>\n    <div class=\"s-rule\" aria-hidden=\"true\"><span class=\"s1\"><\u002Fspan><span class=\"s2\"><\u002Fspan><span class=\"s3\"><\u002Fspan><\u002Fdiv>\n\n    <!-- Dashboard mock -->\n    <h4 style=\"font-family:'Archivo Black',sans-serif;letter-spacing:-0.005em;color:var(--navy-deep);margin:18px 0 4px;font-size:18px;\">Daily delivery tracker <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;font-weight:400;\">(illustrative)<\u002Fspan><\u002Fh4>\n    <p class=\"body\" style=\"color:var(--ink);font-size:14px;margin-bottom:0;\"><em>Example layout — final tracker shape calibrated at kickoff. The tracker is a shared document accessible to Kori, the comms lead, and the data lead, updated as bookings confirm and spots go live.<\u002Fem><\u002Fp>\n    <div class=\"dash\" id=\"dash\">\n      <div class=\"dash-head\">\n        <div class=\"name\">WOW<span class=\"bang\">!<\u002Fspan>SGNL · STEYER · CA-GOV<\u002Fdiv>\n        <span class=\"example-chip\" aria-label=\"Example data\">Example<\u002Fspan>\n        <div class=\"live\">Live · Day 14 of 30<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dash-grid\">\n        <div class=\"dash-tile\"><div class=\"lbl\">Spots Live<\u002Fdiv><div class=\"val\">22 / 40<\u002Fdiv><div class=\"delta\">+4 since yesterday<\u002Fdiv><\u002Fdiv>\n        <div class=\"dash-tile teal\"><div class=\"lbl\">Public Views<\u002Fdiv><div class=\"val\">~14M<\u002Fdiv><div class=\"delta\">illustrative · aggregated from creator channels<\u002Fdiv><\u002Fdiv>\n        <div class=\"dash-tile teal\"><div class=\"lbl\">Comment Sentiment<\u002Fdiv><div class=\"val\">Net positive<\u002Fdiv><div class=\"delta\">qualitative read · weekly scan<\u002Fdiv><\u002Fdiv>\n        <div class=\"dash-tile red\"><div class=\"lbl\">Flags Open<\u002Fdiv><div class=\"val\">0<\u002Fdiv><div class=\"delta\">Last flag: Day 9 · cleared<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"dash-caption\">Tracker pulls public view counts and comment sentiment from creator channels. Watch-through, geographic breakdown, and audience demographics live inside each creator's YouTube Analytics — we report what we can verify, not what we'd guess.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- SLA table -->\n    <h4 style=\"font-family:'Archivo Black',sans-serif;letter-spacing:-0.005em;color:var(--navy-deep);margin:42px 0 4px;font-size:18px;\">Creative review SLAs &amp; approver flow.<\u002Fh4>\n    <p class=\"body\" style=\"color:var(--ink);font-size:14px;margin-bottom:0;\">Two named approvers from your side. WOW!SGNL routes; you decide.<\u002Fp>\n    <table class=\"sla\">\n      <thead>\n        <tr>\n          <th>Stage<\u002Fth>\n          <th>Approver<\u002Fth>\n          <th>Turnaround<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td>Talking-points doctrine<span class=\"who\">campaign comms lead<\u002Fspan><\u002Ftd>\n          <td>Kori<span class=\"who\">+ named alternate<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">24h, signing<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Per-creator script v1<span class=\"who\">drafted with creator<\u002Fspan><\u002Ftd>\n          <td>WOW!SGNL CD<span class=\"who\">routes to Kori on flag<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">48h drafting<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Final cut review<span class=\"who\">posted unlisted<\u002Fspan><\u002Ftd>\n          <td>Kori or alternate<span class=\"who\">flagged spots → Tom<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">4h, in-market<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Spot pull-down decision<span class=\"who\">any creator-side issue<\u002Fspan><\u002Ftd>\n          <td>Kori or alternate<span class=\"who\">escalation path → Tom<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">Same-day<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <!-- Format mix -->\n    <h4 style=\"font-family:'Archivo Black',sans-serif;letter-spacing:-0.005em;color:var(--navy-deep);margin:42px 0 4px;font-size:18px;\">One format. Two flavors.<\u002Fh4>\n    <p class=\"body\" style=\"color:var(--ink);font-size:14px;margin-bottom:14px;\">There is one product: a 60–90 second creator-voice endorsement of Steyer, dropped into the creator's own feed. Two ways to film it — the choice is per-creator, calibrated to what their audience already accepts as native. <b>No dedicated long-form Steyer videos.<\u002Fb> There isn't time, and that's not what moves these audiences anyway.<\u002Fp>\n    <div class=\"formats\">\n      <div class=\"fmt\">\n        <div class=\"fmt-tag\">Flavor 1 · 60–90s<\u002Fdiv>\n        <h5>Creator narrates over B-roll.<\u002Fh5>\n        <p>We supply the B-roll — Tom in Sacramento, climate-cause footage, working-Californian visuals, family scenes, however the campaign wants Steyer presented. The creator records voiceover in their own register, in their own language, on their own thesis. Their audience hears a voice they trust framing footage we control.<\u002Fp>\n        <ul>\n          <li>Campaign supplies B-roll package; creator writes their own VO<\u002Fli>\n          <li>Creator never has to be on-camera with a politician<\u002Fli>\n          <li>Lowest production friction — most creators turn this in 48–72 hours<\u002Fli>\n          <li>Clear California paid third-party influencer disclosure — spoken, on-screen, in the description, and platform paid-promotion box checked<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"fmt premium\">\n        <div class=\"fmt-tag\">Flavor 2 · 60–90s<\u002Fdiv>\n        <h5>Selfie endorsement.<\u002Fh5>\n        <p>The creator films themselves — phone, their kitchen, their car, wherever they normally shoot — and delivers a personal endorsement in their own voice. \"Real quick before we go on, this video is brought to you by Tom Steyer, and here's why I said yes…\" Then back to whatever they were already doing.<\u002Fp>\n        <ul>\n          <li>Maximum trust transfer — it's their face, their words, their take<\u002Fli>\n          <li>Zero campaign production lift — they shoot it on their phone<\u002Fli>\n          <li>3 rounds of script review before they hit record<\u002Fli>\n          <li>Clear California paid third-party influencer disclosure — spoken, on-screen, in the description, and platform paid-promotion box checked<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Mix economics -->\n    <h4 style=\"font-family:'Archivo Black',sans-serif;letter-spacing:-0.005em;color:var(--navy-deep);margin:42px 0 4px;font-size:18px;\">How the budget breaks down at $15M authorized.<\u002Fh4>\n    <p class=\"body\" style=\"color:var(--ink);font-size:14px;margin-bottom:14px;\">$15M is the authorized creator + production budget. WOW!SGNL fees are billed separately on top. Indicative — final mix calibrated to roster the week of signing.<\u002Fp>\n    <table class=\"sla\">\n      <thead>\n        <tr>\n          <th>Line<\u002Fth>\n          <th>Bookings<\u002Fth>\n          <th>Avg. Per<\u002Fth>\n          <th>Subtotal<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td>Creator endorsement reads<span class=\"who\">B-roll narration or selfie endorsement · 60–90s<\u002Fspan><\u002Ftd>\n          <td>~40<\u002Ftd>\n          <td><span class=\"turn\">$200K–$500K<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">~$14.0M<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Production &amp; trafficking<span class=\"who\">B-roll package, scripts, edits, drop scheduling<\u002Fspan><\u002Ftd>\n          <td>—<\u002Ftd>\n          <td>—<\u002Ftd>\n          <td><span class=\"turn\">~$1.0M<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr class=\"total-row\">\n          <td><b>Creator / Production Budget<\u002Fb><span class=\"who\">authorized — billed direct from campaign to creators<\u002Fspan><\u002Ftd>\n          <td>40<\u002Ftd>\n          <td>—<\u002Ftd>\n          <td><span class=\"turn\"><b>$15.0M<\u002Fb><\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>WOW!SGNL Fee<span class=\"who\">tiered % on authorized budget · $700K minimum<\u002Fspan><\u002Ftd>\n          <td>—<\u002Ftd>\n          <td>—<\u002Ftd>\n          <td><span class=\"turn\">$2.55M<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr class=\"total-row\">\n          <td><b>Total Campaign Cost<\u002Fb><span class=\"who\">at the recommended commitment<\u002Fspan><\u002Ftd>\n          <td>—<\u002Ftd>\n          <td>—<\u002Ftd>\n          <td><span class=\"turn\"><b>$17.55M<\u002Fb><\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <!-- Roster examples -->\n    <h4 style=\"font-family:'Archivo Black',sans-serif;letter-spacing:-0.005em;color:var(--navy-deep);margin:42px 0 4px;font-size:18px;\">What the roster actually looks like.<\u002Fh4>\n    <p class=\"body\" style=\"color:var(--ink);font-size:14px;margin-bottom:14px;\"><em>Indicative names and rate ranges from our 100-creator longlist. Final ~40-creator roster locked the week of signing — exact names depend on availability, creative fit, brand-safety vetting, and California compliance eligibility and platform eligibility. Caleb personally vets every roster decision.<\u002Fem><\u002Fp>\n    <table class=\"sla roster\">\n      <thead>\n        <tr>\n          <th>Lane<\u002Fth>\n          <th>Example creators (illustrative)<\u002Fth>\n          <th>Rate range / booking<\u002Fth>\n          <th>CA / Latino weight<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td>Mexican-American Comedy<\u002Ftd>\n          <td>Felipe Esparza, Jesús Trejo, George Lopez network, Cristela Alonzo<span class=\"who\">stand-up + sketch<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">$100K–$400K<\u002Fspan><\u002Ftd>\n          <td>High both<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>LA Lifestyle / Vlog<\u002Ftd>\n          <td>Brittany Broski, Smosh-orbit creators, Emma Chamberlain–adjacent CA vloggers<span class=\"who\">day-in-the-life + commentary<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">$200K–$500K<\u002Fspan><\u002Ftd>\n          <td>High CA<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Food &amp; Restaurant<\u002Ftd>\n          <td>Sam the Cooking Guy (SD), Food Wishes (Bay Area), Claudia Sandoval, Rie McClenny<span class=\"who\">recipe + restaurant<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">$75K–$200K<\u002Fspan><\u002Ftd>\n          <td>Mixed<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Música Urbana / Regional Mexicano<\u002Ftd>\n          <td>Becky G channel, Cuco-orbit creators, regional Mexicano creator network<span class=\"who\">artist channels + behind-the-music<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">$300K–$800K<\u002Fspan><\u002Ftd>\n          <td>Highest Latino<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Faith &amp; Family<\u002Ftd>\n          <td>David Lopez Films-tier creators, family-vlog Spanglish channels<span class=\"who\">parenting + values<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">$40K–$150K<\u002Fspan><\u002Ftd>\n          <td>Latino-heavy<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Auto / Lowrider<\u002Ftd>\n          <td>Lowrider-culture YouTubers, regional auto-build channels<span class=\"who\">build vlogs + meet-ups<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">$30K–$100K<\u002Fspan><\u002Ftd>\n          <td>Latino-heavy<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Sports-Adjacent<\u002Ftd>\n          <td>Ballislife, Lakers Nation, boxing-culture creators, Liga MX adjacent<span class=\"who\">boxing · fútbol · Lakers-orbit<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">$75K–$350K<\u002Fspan><\u002Ftd>\n          <td>High both<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Political Floor<span class=\"who\">safety net only<\u002Fspan><\u002Ftd>\n          <td>5 explicitly political creators — names finalized at signing<span class=\"who\">FPPC-clean baseline<\u002Fspan><\u002Ftd>\n          <td><span class=\"turn\">$25K–$100K<\u002Fspan><\u002Ftd>\n          <td>n/a<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n    <p class=\"body\" style=\"color:var(--ink);font-size:13px;margin-top:10px;font-style:italic;\">Rates are working ranges from our market research and prior conversations with the agencies — exact rates lock at booking. Names indicative only. Booked roster locked the week of signing pending availability + brand-safety vetting + California compliance eligibility and platform eligibility.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 06 PRICING -->\n  <section class=\"s reveal\" id=\"s5\">\n    <div class=\"s-num\">§ 06 — Pricing<\u002Fdiv>\n    <span class=\"s-tab\">For Governor<\u002Fspan>\n    <h3 class=\"s-title\">Tiered pass-through, three spend levels.<\u002Fh3>\n    <div class=\"s-rule\" aria-hidden=\"true\"><span class=\"s1\"><\u002Fspan><span class=\"s2\"><\u002Fspan><span class=\"s3\"><\u002Fspan><\u002Fdiv>\n\n    <p class=\"lede\" style=\"margin-bottom:24px;\">Fee-only on the campaign-authorized creator/production budget — creator payments flow directly from the campaign, WOW!SGNL takes no margin on creator costs and never holds those funds. <b>$700,000 minimum WOW!SGNL fee, fully earned on contract execution, non-refundable, non-cancellable.<\u002Fb> Tiers: 20% on first $3M / 18% on $3–8M / 15% on $8–15M / 12% above $15M. Payment: <b>$350,000 due on execution; $350,000 (or balance above the minimum) due no later than June 16, 2026 — or immediately upon termination, suspension, or material reduction, whichever comes first.<\u002Fb><\u002Fp>\n\n    <div class=\"price-headline\">\n      <div class=\"ph-card\">\n        <div class=\"lvl\">Spend Level 01<\u002Fdiv>\n        <div class=\"amt\">$6M<\u002Fdiv>\n        <div class=\"fee\">Fee: <b>$1,140,000<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ph-card\">\n        <div class=\"lvl\">Spend Level 02<\u002Fdiv>\n        <div class=\"amt\">$10M<\u002Fdiv>\n        <div class=\"fee\">Fee: <b>$1,800,000<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ph-card recommended\">\n        <div class=\"lvl\">★ Recommended<\u002Fdiv>\n        <div class=\"amt\">$15M<\u002Fdiv>\n        <div class=\"fee\">Fee: <b>$2,550,000<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"price-meta\">\n      <div class=\"min-fee\">Minimum WOW!SGNL fee <b>$700,000<\u002Fb> · earned on signing · non-refundable · non-cancellable<\u002Fdiv>\n      <div class=\"tiers\">Tiers: 20% on first $3M / 18% on $3–8M / 15% on $8–15M / 12% above $15M. Fee calculated on <b>authorized<\u002Fb> creator/production budget. <b>$350K due on execution · $350K due by June 16, 2026 (or on termination/reduction).<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 07 TERMS -->\n  <section class=\"s reveal full-only\" id=\"s6\">\n    <div class=\"s-num\">§ 07 — Terms<\u002Fdiv>\n    <span class=\"s-tab\">For Governor<\u002Fspan>\n    <h3 class=\"s-title\">Terms in one line each.<\u002Fh3>\n    <div class=\"s-rule\" aria-hidden=\"true\"><span class=\"s1\"><\u002Fspan><span class=\"s2\"><\u002Fspan><span class=\"s3\"><\u002Fspan><\u002Fdiv>\n\n    <ul class=\"terms-list\">\n      <li><span class=\"k\">Fee<\u002Fspan><span class=\"v\">WOW!SGNL's fee is calculated on the campaign-authorized creator/production budget: 20% on the first $3M, 18% on $3M–$8M, 15% on $8M–$15M, and 12% above $15M. Fees are based on <b>authorized<\u002Fb> budget, not solely on aired placements. The minimum WOW!SGNL fee is <b>$700,000<\u002Fb>, fully earned upon contract execution, non-refundable, and non-cancellable.<\u002Fspan><\u002Fli>\n      <li><span class=\"k\">Payment<\u002Fspan><span class=\"v\"><b>$350,000 due upon execution.<\u002Fb> The remaining $350,000 (or balance above the minimum, whichever is greater) is due no later than <b>June 16, 2026<\u002Fb>, or immediately upon termination, suspension, or material reduction of the program — whichever occurs first. Termination, reduced creator spend, delayed approvals, creator cancellations, or campaign-side operational delays do not reduce or eliminate the minimum fee.<\u002Fspan><\u002Fli>\n      <li><span class=\"k\">Pass-through<\u002Fspan><span class=\"v\">All creator payments are made by the Steyer for California committee directly to creators or creator representatives, processed through the campaign's existing accounting and compliance infrastructure. WOW!SGNL does not hold creator funds and takes no margin on creator payments. Per-creator packets (W-9, address, signed agreement, post URL when live, agreed fee, required California paid third-party influencer disclosure language, screenshots of disclosure post-publication) delivered ready for processing.<\u002Fspan><\u002Fli>\n      <li><span class=\"k\">Reconciliation<\u002Fspan><span class=\"v\">Weekly memo to your treasurer/accounting counsel listing every booking authorized that week — creator name, amount, purpose, and FPPC/platform disclosure status — formatted to support the campaign's <b>Form 460 Schedule E/G<\u002Fb> workflow as directed by treasurer/accounting counsel.<\u002Fspan><\u002Fli>\n      <li><span class=\"k\">Disclosure<\u002Fspan><span class=\"v\">Every creator placement must include the following or campaign-counsel-approved equivalent: <em>\"The author was paid by [committee name] in connection with this posting.\"<\u002Fem> Disclosure must be <b>spoken<\u002Fb>, <b>shown on-screen<\u002Fb> during the paid segment, included in the <b>first line of the video description<\u002Fb>, and paired with the platform's <b>paid-promotion disclosure tool<\u002Fb>. No creator goes live until all four are confirmed.<\u002Fspan><\u002Fli>\n      <li><span class=\"k\">Platform scope<\u002Fspan><span class=\"v\"><b>YouTube-first.<\u002Fb> No paid TikTok political creator placements (TikTok policy prohibits paid political content). Cross-posting to creator-owned Instagram/X channels permitted where compliant with each platform's paid-political rules and reviewed by campaign counsel.<\u002Fspan><\u002Fli>\n      <li><span class=\"k\">IP &amp; Usage<\u002Fspan><span class=\"v\">Campaign owns campaign-supplied materials, WOW!SGNL-created strategy materials, approved talking-points frameworks, and scripts prepared by WOW!SGNL for the campaign. Creator retains ownership of creator-produced channel content unless otherwise agreed in the creator contract. Campaign receives <b>paid usage, whitelisting, boosting, clipping, and amplification rights<\u002Fb> to the creator endorsement segment for the campaign period and <b>90 days post-primary<\u002Fb>, subject to each creator agreement.<\u002Fspan><\u002Fli>\n      <li><span class=\"k\">Approvals<\u002Fspan><span class=\"v\">Campaign must designate one treasurer/accounting owner and one counsel owner within 24 hours of signing. Two named approvers from the campaign side. 4-hour SLA on revisions during the in-market phase. Escalation path to Tom for any spot Kori flags as principal-level. Payment delays, legal delays, or missing campaign approvals shift live-date targets but do not reduce the minimum fee.<\u002Fspan><\u002Fli>\n      <li><span class=\"k\">Termination<\u002Fspan><span class=\"v\">Either party may terminate with <b>15 business days' written notice<\u002Fb>. WOW!SGNL may terminate immediately for non-payment of any invoiced amount past 7 calendar days. <b>Termination does not waive, reduce, delay, or refund the WOW!SGNL minimum fee.<\u002Fb> Creator cancellation, refund, kill-fee, and make-good terms are governed by individual creator agreements and paid or refunded directly between the campaign and the creator. WOW!SGNL does not guarantee creator refunds and does not hold creator funds.<\u002Fspan><\u002Fli>\n      <li><span class=\"k\">No performance guarantee<\u002Fspan><span class=\"v\">WOW!SGNL does not guarantee votes, polling movement, electoral outcome, platform distribution, creator audience demographics, view counts, engagement, sentiment, or algorithmic performance. WOW!SGNL guarantees execution against the approved booking, creative, compliance, and reporting workflow — subject to creator availability, campaign approvals, campaign payment speed, and platform policies.<\u002Fspan><\u002Fli>\n      <li><span class=\"k\">NDA<\u002Fspan><span class=\"v\">Mutual NDA in effect from execution. Strategy, creator list, and modeling are Campaign property and Campaign-confidential.<\u002Fspan><\u002Fli>\n    <\u002Ful>\n  <\u002Fsection>\n\n  <!-- 08 WHY US -->\n  <section class=\"s reveal\" id=\"s7\">\n    <div class=\"s-num\">§ 08 — Why us<\u002Fdiv>\n    <span class=\"s-tab\">For Governor<\u002Fspan>\n    <h3 class=\"s-title\">Why us.<\u002Fh3>\n    <div class=\"s-rule\" aria-hidden=\"true\"><span class=\"s1\"><\u002Fspan><span class=\"s2\"><\u002Fspan><span class=\"s3\"><\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <div class=\"why reveal\">\n    <p class=\"why-kicker\">Track Record <span class=\"dot\">·<\u002Fspan> Two cycles, two states <span class=\"dot\">·<\u002Fspan> Verified<\u002Fp>\n    <p class=\"why-statement\">Built on the same creator infrastructure that generated <span class=\"big\">463M<\u002Fspan> organic views and <span class=\"big\">1.3M<\u002Fspan> opt-in supporters for Ro Khanna in 2025 — the largest organic political distribution operation in modern Democratic politics.<\u002Fp>\n    <div class=\"why-stats\">\n      <div class=\"why-stat\">\n        <div class=\"num\">463M<\u002Fdiv>\n        <div class=\"lbl\">Organic views — Khanna 2025<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"why-stat\">\n        <div class=\"num\">1.3M<\u002Fdiv>\n        <div class=\"lbl\">Opt-in supporters captured<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"why-second\">Co-architect of the <span class=\"big\">Markeyverse<\u002Fspan> — the digital coalition that powered Ed Markey's 2020 Senate primary upset over Joe Kennedy III. Two cycles, two states, two coalitions: that's pattern, not fluke.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- 09 SIGN -->\n  <section class=\"s\" id=\"s8\">\n    <div class=\"s-num\">§ 09 — Sign<\u002Fdiv>\n    <span class=\"s-tab\">For Governor<\u002Fspan>\n    <h3 class=\"s-title\">Sign &amp; contact.<\u002Fh3>\n    <div class=\"s-rule\" aria-hidden=\"true\"><span class=\"s1\"><\u002Fspan><span class=\"s2\"><\u002Fspan><span class=\"s3\"><\u002Fspan><\u002Fdiv>\n\n    <div class=\"sign reveal\">\n      <div class=\"sign-urgency\">\n        <p class=\"lbl\">⚑ Urgency<\u002Fp>\n        <p class=\"when\">Sign by <span class=\"em\">Friday, May 1.<\u002Fspan><\u002Fp>\n        <p class=\"why-soon\">It's Monday, April 27 — five business days to lock talent before in-market on May 1. Top California creator inventory in the final 30 days is finite. The same talent pool is being hunted by competing campaigns nationwide. Every business day past May 1 is a creator we cannot recover.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sign-contact\">\n        <div>\n          <p class=\"name\">Caleb Brock<\u002Fp>\n          <p class=\"role\">Founder &amp; CEO · WOW!SGNL · Washington, DC<\u002Fp>\n          <div class=\"lines\">\n            <div><a href=\"mailto:caleb@wowsgnl.com\">caleb@wowsgnl.com<\u002Fa><\u002Fdiv>\n            <div><a href=\"tel:+19729712001\">972 · 971 · 2001<\u002Fa><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"seal\">\n          Proposal No.<br>2026-04-24\n          <span class=\"id\">WS · STEYER · CA-GOV<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"colophon\">\n      <div>WOW!SGNL — Confidential Proposal<\u002Fdiv>\n      <div>Set in Archivo Black, Inter Tight, JetBrains Mono<\u002Fdiv>\n      <div>v6 · April 26, 2026<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<script>\n  // ===== MOBILE LABEL INJECTION =====\n  // Add data-lbl to SLA table cells (uses thead text) and data-week to calendar cells\n  (function(){\n    document.querySelectorAll('table.sla').forEach(function(tbl){\n      var ths = Array.from(tbl.querySelectorAll('thead th')).map(function(th){ return th.textContent.trim(); });\n      tbl.querySelectorAll('tbody tr').forEach(function(tr){\n        Array.from(tr.children).forEach(function(td, i){\n          if (ths[i]) td.setAttribute('data-lbl', ths[i]);\n        });\n      });\n    });\n    document.querySelectorAll('.cal-row').forEach(function(row){\n      var head = document.querySelector('.cal-head');\n      var labels = head ? Array.from(head.children).slice(1).map(function(d){\n        // Take only the week token (e.g. \"W1\" from \"W1 · Sprint\") for compact mobile labels\n        var t = d.textContent.trim();\n        var m = t.match(/W\\d+/);\n        return m ? m[0] : t;\n      }) : [];\n      var cells = row.querySelectorAll('.cell');\n      cells.forEach(function(c, i){\n        if (labels[i]) c.setAttribute('data-week', labels[i]);\n      });\n    });\n  })();\n\n  // ===== TOM MODE =====\n  const tomToggle = document.getElementById('tomToggle');\n  const readTime  = document.getElementById('readTime');\n  let tomMode = true;\n  function applyTom() {\n    document.body.classList.toggle('tom-mode', tomMode);\n    tomToggle.setAttribute('aria-pressed', tomMode ? 'true' : 'false');\n    if (tomMode) {\n      readTime.textContent = '~75 sec read';\n      readTime.classList.add('tom');\n    } else {\n      readTime.textContent = '~7 min read';\n      readTime.classList.remove('tom');\n    }\n  }\n  tomToggle.addEventListener('click', () => {\n    tomMode = !tomMode;\n    document.body.classList.add('tom-flash');\n    setTimeout(() => document.body.classList.remove('tom-flash'), 380);\n    applyTom();\n    document.body.classList.add('tom-touched');\n  });\n  tomToggle.addEventListener('keydown', (e) => {\n    if (e.key === 'Enter' || e.key === ' ') {\n      e.preventDefault(); tomMode = !tomMode; applyTom();\n      document.body.classList.add('tom-touched');\n    }\n  });\n  applyTom();\n\n  // ===== SCROLL PROGRESS + PARALLAX =====\n  const progress = document.getElementById('progress');\n  const stripes  = document.querySelectorAll('.mast-stripes span');\n  function onScroll() {\n    const h = document.documentElement;\n    const max = h.scrollHeight - h.clientHeight;\n    const y = h.scrollTop || document.body.scrollTop;\n    const p = max > 0 ? y / max : 0;\n    progress.style.width = (Math.min(1, Math.max(0, p)) * 100) + '%';\n    // parallax mast stripes — different rates\n    if (stripes.length === 3 && y < 800) {\n      stripes[0].style.transform = `scaleX(1) translateX(${y * -0.18}px)`;\n      stripes[1].style.transform = `scaleX(1) translateX(${y * -0.12}px)`;\n      stripes[2].style.transform = `scaleX(1) translateX(${y * -0.06}px)`;\n    }\n  }\n  document.addEventListener('scroll', onScroll, { passive: true });\n  onScroll();\n\n  // ===== REVEAL =====\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach((en) => {\n      if (en.isIntersecting) {\n        en.target.classList.add('in');\n        io.unobserve(en.target);\n      }\n    });\n  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });\n  document.querySelectorAll('.reveal').forEach((el, i) => {\n    el.style.transitionDelay = ((i % 3) * 90) + 'ms';\n    io.observe(el);\n  });\n\n  // Timeline animation\n  const tl = document.getElementById('timeline');\n  if (tl) {\n    const tlIo = new IntersectionObserver((es) => {\n      es.forEach(e => { if (e.isIntersecting) { tl.classList.add('in-view'); tlIo.unobserve(tl); } });\n    }, { threshold: 0.3 });\n    tlIo.observe(tl);\n  }\n  const dash = document.getElementById('dash');\n  if (dash) {\n    const dIo = new IntersectionObserver((es) => {\n      es.forEach(e => { if (e.isIntersecting) { dash.classList.add('in-view'); dIo.unobserve(dash); } });\n    }, { threshold: 0.3 });\n    dIo.observe(dash);\n  }\n\n  // Category stripes (§02)\n  const cat = document.getElementById('catStripes');\n  if (cat) {\n    const cIo = new IntersectionObserver((es) => {\n      es.forEach(e => { if (e.isIntersecting) { cat.classList.add('run'); cIo.unobserve(cat); } });\n    }, { threshold: 0.25 });\n    cIo.observe(cat);\n  }\n\n  // ===== LOAD =====\n  requestAnimationFrame(() => {\n    requestAnimationFrame(() => document.body.classList.add('loaded'));\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
